services:
  langchain-api:
    build:
      context: ./app
    container_name: langchain-api
    ports:
      - "${LANGCHAIN_API_PORT:-8100}:8100"
    environment:
      - LITELLM_PROXY_URL=${LITELLM_PROXY_URL}
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MAX_JUDGE_RETRIES=${MAX_JUDGE_RETRIES:-2}
      - RAGAS_RESPONSE_RELEVANCY_THRESHOLD=${RAGAS_RESPONSE_RELEVANCY_THRESHOLD:-0.7}
      - RAGAS_DO_NOT_TRACK=true
      - HF_HOME=/data/hf_cache
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-cl-nagoya/ruri-v3-310m}
      - INGEST_CHUNK_SIZE=${INGEST_CHUNK_SIZE:-1000}
      - INGEST_CHUNK_OVERLAP=${INGEST_CHUNK_OVERLAP:-200}
    volumes:
      - ./config:/config:ro
      - ./data/documents:/data/documents
      - ./data/hf_cache:/data/hf_cache
    depends_on:
      chromadb:
        condition: service_started
    restart: unless-stopped
    networks:
      - langchain-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "${CHROMA_PORT:-8200}:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - langchain-net

networks:
  langchain-net:
    driver: bridge
