services:
  langchain-api:
    build:
      context: ./app
    container_name: langchain-api
    ports:
      - "${LANGCHAIN_API_PORT:-8100}:8100"
    environment:
      - LITELLM_PROXY_URL=${LITELLM_PROXY_URL}
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - LLAMA_SERVER_URL=${LLAMA_SERVER_URL:-}
      - PORTABLE_LLM_SERVER_URL=${PORTABLE_LLM_SERVER_URL:-}
      - CLOUD_API_URL=${CLOUD_API_URL:-}
      - CLOUD_API_KEY=${CLOUD_API_KEY:-}
      - REASONER_LOCAL_MODEL=${REASONER_LOCAL_MODEL:-}
      - REASONER_PORTABLE_MODEL=${REASONER_PORTABLE_MODEL:-}
      - REASONER_CLOUD_MODEL=${REASONER_CLOUD_MODEL:-}
      - JUDGE_LOCAL_MODEL=${JUDGE_LOCAL_MODEL:-}
      - JUDGE_PORTABLE_MODEL=${JUDGE_PORTABLE_MODEL:-}
      - JUDGE_CLOUD_MODEL=${JUDGE_CLOUD_MODEL:-}
      - HEALTH_PROBE_TIMEOUT=${HEALTH_PROBE_TIMEOUT:-2.0}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MAX_JUDGE_RETRIES=${MAX_JUDGE_RETRIES:-2}
      - RAGAS_RESPONSE_RELEVANCY_THRESHOLD=${RAGAS_RESPONSE_RELEVANCY_THRESHOLD:-0.7}
      - RAGAS_FAITHFULNESS_THRESHOLD=${RAGAS_FAITHFULNESS_THRESHOLD:-0.7}
      - RAGAS_CONTEXT_PRECISION_THRESHOLD=${RAGAS_CONTEXT_PRECISION_THRESHOLD:-0.7}
      - RAGAS_DO_NOT_TRACK=true
      - HF_HOME=/data/hf_cache
      - HF_HUB_OFFLINE=1
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-cl-nagoya/ruri-v3-310m}
      - INGEST_DEVICE=${INGEST_DEVICE:-cpu}
      - EMBEDDING_AB_SUFFIX=${EMBEDDING_AB_SUFFIX:-}
      - INGEST_CHUNK_SIZE=${INGEST_CHUNK_SIZE:-1000}
      - INGEST_CHUNK_OVERLAP=${INGEST_CHUNK_OVERLAP:-200}
      - RAG_TOP_K=${RAG_TOP_K:-10}
      - INGEST_API_KEY=${INGEST_API_KEY:-}
      - CHAT_API_KEY_KYOKO=${CHAT_API_KEY_KYOKO:-}
      - CHAT_API_KEY_NIRE=${CHAT_API_KEY_NIRE:-}
      - CHAT_API_KEY_EDGE=${CHAT_API_KEY_EDGE:-}
      - CHAT_API_KEY_LUTE=${CHAT_API_KEY_LUTE:-}
      - AUDIT_LOG_PATH=${AUDIT_LOG_PATH:-/data/audit/ingest.jsonl}
      - OPENSEARCH_URL=http://opensearch:9200
      - OS_INDEX_PREFIX=${OS_INDEX_PREFIX:-ls_}
      - VECTOR_BACKEND=${VECTOR_BACKEND:-opensearch}
      - HYBRID_PIPELINE_NAME=${HYBRID_PIPELINE_NAME:-hybrid-bm25-knn}
      - SEARCH_MODE=${SEARCH_MODE:-hybrid+header}
    volumes:
      - ./config:/config:ro
      - ./data/documents:/data/documents
      - ./data/hf_cache:/data/hf_cache
      - ./data/audit:/data/audit
    depends_on:
      chromadb:
        condition: service_started
      opensearch:
        condition: service_started
    restart: unless-stopped
    networks:
      - langchain-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "127.0.0.1:${CHROMA_PORT:-8200}:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - langchain-net

  chromadb-admin:
    image: chromadb-admin:local
    container_name: chromadb-admin
    ports:
      - "127.0.0.1:${CHROMA_ADMIN_PORT:-3001}:3001"
    depends_on:
      chromadb:
        condition: service_started
    restart: unless-stopped
    networks:
      - langchain-net

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: opensearch
    entrypoint:
      - /bin/bash
      - -c
      - |
        /usr/share/opensearch/bin/opensearch-plugin install --batch analysis-kuromoji 2>/dev/null || true
        /usr/share/opensearch/bin/opensearch-plugin install --batch analysis-icu 2>/dev/null || true
        exec /usr/share/opensearch/opensearch-docker-entrypoint.sh opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "127.0.0.1:${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data
    restart: unless-stopped
    networks:
      - langchain-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: opensearch-dashboards
    ports:
      - "127.0.0.1:${OSD_PORT:-5601}:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_started
    restart: unless-stopped
    networks:
      - langchain-net

networks:
  langchain-net:
    driver: bridge
