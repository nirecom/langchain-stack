services:
  langchain-api:
    build:
      context: ./app
    container_name: langchain-api
    ports:
      - "${LANGCHAIN_API_PORT:-8100}:8100"
    environment:
      - LITELLM_PROXY_URL=${LITELLM_PROXY_URL}
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - LLAMA_SERVER_URL=${LLAMA_SERVER_URL:-}
      - PORTABLE_LLM_SERVER_URL=${PORTABLE_LLM_SERVER_URL:-}
      - CLOUD_API_URL=${CLOUD_API_URL:-}
      - CLOUD_API_KEY=${CLOUD_API_KEY:-}
      - REASONER_LOCAL_MODEL=${REASONER_LOCAL_MODEL:-}
      - REASONER_PORTABLE_MODEL=${REASONER_PORTABLE_MODEL:-}
      - REASONER_CLOUD_MODEL=${REASONER_CLOUD_MODEL:-}
      - JUDGE_LOCAL_MODEL=${JUDGE_LOCAL_MODEL:-}
      - JUDGE_PORTABLE_MODEL=${JUDGE_PORTABLE_MODEL:-}
      - JUDGE_CLOUD_MODEL=${JUDGE_CLOUD_MODEL:-}
      - HEALTH_PROBE_TIMEOUT=${HEALTH_PROBE_TIMEOUT:-2.0}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MAX_JUDGE_RETRIES=${MAX_JUDGE_RETRIES:-2}
      - RAGAS_RESPONSE_RELEVANCY_THRESHOLD=${RAGAS_RESPONSE_RELEVANCY_THRESHOLD:-0.7}
      - RAGAS_FAITHFULNESS_THRESHOLD=${RAGAS_FAITHFULNESS_THRESHOLD:-0.7}
      - RAGAS_CONTEXT_PRECISION_THRESHOLD=${RAGAS_CONTEXT_PRECISION_THRESHOLD:-0.7}
      - RAGAS_DO_NOT_TRACK=true
      - HF_HOME=/data/hf_cache
      - HF_HUB_OFFLINE=1
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-cl-nagoya/ruri-v3-310m}
      - INGEST_DEVICE=${INGEST_DEVICE:-cpu}
      - EMBEDDING_AB_SUFFIX=${EMBEDDING_AB_SUFFIX:-}
      - INGEST_CHUNK_SIZE=${INGEST_CHUNK_SIZE:-1000}
      - INGEST_CHUNK_OVERLAP=${INGEST_CHUNK_OVERLAP:-200}
      - RAG_TOP_K=${RAG_TOP_K:-10}
      - INGEST_API_KEY=${INGEST_API_KEY:-}
      - CHAT_API_KEY_KYOKO=${CHAT_API_KEY_KYOKO:-}
      - CHAT_API_KEY_NIRE=${CHAT_API_KEY_NIRE:-}
      - CHAT_API_KEY_EDGE=${CHAT_API_KEY_EDGE:-}
      - CHAT_API_KEY_LUTE=${CHAT_API_KEY_LUTE:-}
      - AUDIT_LOG_PATH=${AUDIT_LOG_PATH:-/data/audit/ingest.jsonl}
      - OPENSEARCH_URL=http://opensearch:9200
      - OS_INDEX_PREFIX=${OS_INDEX_PREFIX:-ls_}
      - VECTOR_BACKEND=${VECTOR_BACKEND:-opensearch}
      - HYBRID_PIPELINE_NAME=${HYBRID_PIPELINE_NAME:-hybrid-bm25-knn}
      - SEARCH_MODE=${SEARCH_MODE:-hybrid+header}
    volumes:
      - ./config:/config:ro
      - ./data/documents:/data/documents
      - ./data/hf_cache:/data/hf_cache
      - ./data/audit:/data/audit
    depends_on:
      chromadb:
        condition: service_started
      opensearch:
        condition: service_started
    restart: unless-stopped
    networks:
      - langchain-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "127.0.0.1:${CHROMA_PORT:-8200}:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - langchain-net

  chromadb-admin:
    image: chromadb-admin:local
    container_name: chromadb-admin
    ports:
      - "127.0.0.1:${CHROMA_ADMIN_PORT:-3001}:3001"
    depends_on:
      chromadb:
        condition: service_started
    restart: unless-stopped
    networks:
      - langchain-net

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: opensearch
    entrypoint:
      - /bin/bash
      - -c
      - |
        /usr/share/opensearch/bin/opensearch-plugin install --batch analysis-kuromoji 2>/dev/null || true
        /usr/share/opensearch/bin/opensearch-plugin install --batch analysis-icu 2>/dev/null || true
        exec /usr/share/opensearch/opensearch-docker-entrypoint.sh opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "127.0.0.1:${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data
    restart: unless-stopped
    networks:
      - langchain-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: opensearch-dashboards
    ports:
      - "127.0.0.1:${OSD_PORT:-5601}:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_started
    restart: unless-stopped
    networks:
      - langchain-net

  langfuse-postgres:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    environment:
      - POSTGRES_PASSWORD=${LANGFUSE_POSTGRES_PASSWORD}
      - POSTGRES_DB=langfuse
    volumes:
      - ./data/langfuse-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - langchain-net

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: langfuse-clickhouse
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=${LANGFUSE_CLICKHOUSE_PASSWORD}
    volumes:
      - ./data/langfuse-clickhouse/data:/var/lib/clickhouse
      - ./data/langfuse-clickhouse/logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - langchain-net

  langfuse-minio:
    # TODO: pin to specific RELEASE tag after first pull: docker inspect minio/minio:latest --format '{{index .RepoDigests 0}}'
    image: minio/minio:latest
    container_name: langfuse-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=${LANGFUSE_MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/langfuse-minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - langchain-net

  langfuse-minio-createbuckets:
    # TODO: pin to same RELEASE tag as langfuse-minio after first pull
    image: minio/mc:latest
    container_name: langfuse-minio-createbuckets
    depends_on:
      langfuse-minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_PASSWORD=${LANGFUSE_MINIO_ROOT_PASSWORD}
    entrypoint: ["/bin/sh", "-c", "mc alias set minio http://langfuse-minio:9000 minio $$MINIO_ROOT_PASSWORD && mc mb --ignore-existing minio/langfuse"]
    networks:
      - langchain-net

  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    command: redis-server --requirepass ${LANGFUSE_REDIS_AUTH}
    volumes:
      - ./data/langfuse-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LANGFUSE_REDIS_AUTH}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - langchain-net

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse-worker
    environment:
      - DATABASE_URL=postgresql://postgres:${LANGFUSE_POSTGRES_PASSWORD}@langfuse-postgres:5432/langfuse
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - CLICKHOUSE_MIGRATION_URL=clickhouse://langfuse-clickhouse:9000
      - CLICKHOUSE_URL=http://langfuse-clickhouse:8123
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=${LANGFUSE_CLICKHOUSE_PASSWORD}
      - LANGFUSE_S3_EVENT_UPLOAD_ENABLED=true
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://langfuse-minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minio
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${LANGFUSE_MINIO_ROOT_PASSWORD}
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - REDIS_HOST=langfuse-redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${LANGFUSE_REDIS_AUTH}
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio-createbuckets:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - langchain-net

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: langfuse-web
    ports:
      - "127.0.0.1:${LANGFUSE_WEB_PORT:-13000}:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:${LANGFUSE_POSTGRES_PASSWORD}@langfuse-postgres:5432/langfuse
      - NEXTAUTH_URL=${LANGFUSE_NEXTAUTH_URL:-http://127.0.0.1:13000}
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - CLICKHOUSE_MIGRATION_URL=clickhouse://langfuse-clickhouse:9000
      - CLICKHOUSE_URL=http://langfuse-clickhouse:8123
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=${LANGFUSE_CLICKHOUSE_PASSWORD}
      - LANGFUSE_S3_EVENT_UPLOAD_ENABLED=true
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://langfuse-minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minio
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${LANGFUSE_MINIO_ROOT_PASSWORD}
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - REDIS_HOST=langfuse-redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${LANGFUSE_REDIS_AUTH}
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio-createbuckets:
        condition: service_completed_successfully
      langfuse-worker:
        condition: service_started
    restart: unless-stopped
    networks:
      - langchain-net

networks:
  langchain-net:
    driver: bridge
