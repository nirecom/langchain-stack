# A/B evaluation queries for embedding model selection.
#
# Fill in real queries matching your actual document content.
# expected_answer is optional: if provided, Context Recall is also computed.
#
# Usage:
#   uv run python app/evaluation/run_ab.py \
#     --datasource parents-docs \
#     --models ruri,qwen3,bgem3 \
#     --queries tests/data/ab-queries.yaml

queries:
  # --- parents-docs queries ---
  # English queries (cross-lingual: EN query → JA documents)
  - query: "Where do they clean up in their house?"
    language: en
    datasource: parents-docs
    expected_answer: "kitchen, living room"

  - query: "What is their issue to resolve?"
    language: en
    datasource: parents-docs
    expected_answer: "lack of space, not so smooth flow line"

  # Japanese queries (same-lingual: JA query → JA documents)
  - query: "整理収納の対象になる場所はどこが多い?"
    language: ja
    datasource: parents-docs
    expected_answer: "キッチン、リビング"

  - query: "整理収納で解決したい課題は何ですか？"
    language: ja
    datasource: parents-docs
    expected_answer: "スペース不足, 動線がスムーズでない"

  # --- nire-docs queries ---
  # English queries
  - query: "How can I sing clearly"
    language: en
    datasource: nire-docs
    expected_answer: "nasal resonance"

  - query: "What kind of topic did I read?"
    language: en
    datasource: nire-docs
    expected_answer: "news article about endangered emperor penguins"

  # Japanese queries
  - query: "発声のコツはなんですか"
    language: ja
    datasource: nire-docs
    expected_answer: "鼻腔共鳴"

  - query: "今日読んだ内容は?"
    language: ja
    datasource: nire-docs
    expected_answer: "絶滅危惧種のコウテイペンギンに関するニュース記事"
