# A/B evaluation queries for embedding model selection.
#
# Fill in real queries matching your actual document content.
# expected_answer is optional: if provided, Context Recall is also computed.
#
# Usage:
#   uv run --directory app python evaluation/run_ab.py \
#     --datasource parents-docs \
#     --models ruri,qwen3,bgem3 \
#     --queries ../config/ab-queries.yaml
#
#   uv run --directory app python evaluation/run_cp_eval.py \
#     --dataset rag-cp-eval --run-name bgem3-top10-YYYY-MM-DD \
#     --queries ../config/ab-queries.yaml --user nire

queries:
  # --- parents-docs queries ---
  # English queries (cross-lingual: EN query → JA documents)
  # skip_qwen_eval: Qwen2.5-7B cannot reliably bridge EN reference terms to JA context
  - query: "Where do they organize in their house?"
    language: en
    datasource: parents-docs
    expected_answer: "living room, kitchen, bathroom"
    skip_qwen_eval: true

  - query: "What organizing and storage issues are they trying to solve?"
    language: en
    datasource: parents-docs
    expected_answer: "better movement flow and easier item access"
    skip_qwen_eval: true

  # Japanese queries (same-lingual: JA query → JA documents)
  - query: "整理収納の対象になる場所はどこが多い?"
    language: ja
    datasource: parents-docs
    expected_answer: "リビング、キッチン、洗面所"

  - query: "整理収納で解決したい課題は何ですか？"
    language: ja
    datasource: parents-docs
    expected_answer: "動線の改善と取り出しやすさの向上"

  # --- nire-docs queries ---
  # English queries
  # skip_qwen_eval: Qwen2.5-7B cannot reliably bridge EN reference terms to JA context
  - query: "How can I sing clearly"
    language: en
    datasource: nire-docs
    expected_answer: "nasal resonance"
    skip_qwen_eval: true

  - query: "What kind of topic did I read?"
    language: en
    datasource: nire-docs
    expected_answer: "news article about endangered emperor penguins"
    skip_qwen_eval: true

  # Japanese queries
  - query: "発声のコツはなんですか"
    language: ja
    datasource: nire-docs
    expected_answer: "鼻腔共鳴"

  - query: "今日読んだ内容は?"
    language: ja
    datasource: nire-docs
    expected_answer: "絶滅危惧種のコウテイペンギンに関するニュース記事"
