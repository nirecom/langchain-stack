# Model definitions for LLM-as-a-Judge chain.
# These are logical names referenced by LangChain code.
# Actual endpoints and fallback order are defined in litellm_config.yaml.

reasoner:
  description: "Primary inference model for answering user queries"
  litellm_model_name: "reasoner"
  temperature: 0.7
  timeout: 120
  endpoints:
    local:
      timeout: 120
    portable:
      timeout: 30
    cloud:
      timeout: 60

judge:
  description: "Evaluation model for quality assessment"
  litellm_model_name: "judge"
  temperature: 0.0
  timeout: 60
  endpoints:
    local:
      timeout: 15
    portable:
      timeout: 10
    cloud:
      timeout: 30
