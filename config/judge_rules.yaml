# Judge evaluation criteria for LLM-as-a-Judge chain.
# Phase 3A: LLM-based evaluation (tentative — replaced by RAGAS in Phase 3B)
# Phase 4+: RAG-specific criteria added

default:
  description: "General-purpose quality evaluation (Response Relevancy-tentative)"
  criteria:
    - "Relevance: Does the answer directly address the question asked?"
    - "Completeness: Are all parts of the question answered?"
    - "Coherence: Is the answer logically structured and easy to follow?"
    - "Conciseness: Does the answer stay on topic without unnecessary tangents?"
  pass_threshold: 3
  # NOTE: This tentative LLM-based evaluation will be replaced by
  # RAGAS Response Relevancy metric in Phase 3B.

