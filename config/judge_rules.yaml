# Judge evaluation criteria for LLM-as-a-Judge chain.
# Phase 3A: LLM-based evaluation (verdict/score)
# Phase 3B: RAGAS Response Relevancy replaces LLM verdict/score
# Phase 3C: Judge LLM reactivated for feedback-only generation on FAIL
# Phase 4+: RAG-specific criteria added

default:
  description: "General-purpose quality evaluation (Response Relevancy via RAGAS)"
  criteria:
    - "Relevance: Does the answer directly address the question asked?"
    - "Completeness: Are all parts of the question answered?"
    - "Coherence: Is the answer logically structured and easy to follow?"
    - "Conciseness: Does the answer stay on topic without unnecessary tangents?"
  pass_threshold: 3  # Legacy (Phase 3A). Threshold now in .env as RAGAS_RESPONSE_RELEVANCY_THRESHOLD
  # retry_temperature: null  # Reserved for future use. When set, overrides
  #                          # reasoner temperature on retry attempts.

rag:
  description: "RAG-specific evaluation (Phase 4)"
  criteria:
    - "Faithfulness: Is the answer grounded in the provided context?"
    - "Accuracy: Does the answer correctly interpret the source material?"
    - "Completeness: Does the answer use all relevant information from context?"
    - "No Hallucination: Does the answer avoid claims not supported by context?"
