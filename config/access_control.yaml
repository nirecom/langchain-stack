# Access control configuration for datasource and user permissions.
# Datasource names must match ChromaDB collection names exactly.
# Only listed datasources are allowed — unlisted ones are rejected (default-deny).
# User API key values are stored in .env — only the env var name is listed here.
#
# ABAC attributes (abac:, role) are enforced at runtime by app/rag/access_control.py
# using the fornix OU x classification policy
# (see ai-specs/projects/engineering/fornix/ou-classification.md).
# authorized_ous for a user is derived from the OUs of their explicitly listed datasources.

datasources:
  parents-docs:
    description: "Parents shared documents (local file share)"
    abac:
      ou: parents
      classification: internal
  family-docs:
    description: "Family shared documents"
    abac:
      ou: family
      classification: internal
  nire-docs:
    description: "Nire general documents (Notion catch-all)"
    abac:
      ou: nire-personal
      classification: internal
  nire-work:
    description: "Nire work-related Notion content"
    abac:
      ou: nire-personal
      classification: confidential
  nire-healthcare:
    description: "Nire healthcare-related Notion content"
    abac:
      ou: nire-personal
      classification: internal
  nire-finance:
    description: "Nire finance-related Notion content"
    abac:
      ou: nire-personal
      classification: confidential
  nire-english:
    description: "Nire English lesson notes (Notion)"
    abac:
      ou: nire-personal
      classification: internal
  nire-youtube:
    description: "Nire YouTube notes (Notion)"
    abac:
      ou: nire-personal
      classification: public
  test-pytest:
    description: "Test datasource for Phase 4A ingestion tests"
    abac:
      classification: public
  test-ds-mgmt:
    description: "Test datasource for datasource management tests"
    abac:
      classification: public

users:
  nire:
    api_key_env: CHAT_API_KEY_NIRE
    role: ceo
    datasources:
      - parents-docs
      - family-docs
      - nire-docs
      - nire-work
      - nire-healthcare
      - nire-finance
      - nire-english
      - nire-youtube
  kyoko:
    api_key_env: CHAT_API_KEY_KYOKO
    role: member
    datasources: [parents-docs, family-docs]
  edge:
    api_key_env: CHAT_API_KEY_EDGE
    role: member
    datasources: [family-docs]
  lute:
    api_key_env: CHAT_API_KEY_LUTE
    role: member
    datasources: [family-docs]
